<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EduPrime — Student Management</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold:    #c9a84c;
      --gold2:   #e8c96a;
      --dark:    #0d0f14;
      --dark2:   #161a24;
      --dark3:   #1e2433;
      --card:    #1a1f2e;
      --border:  rgba(201,168,76,0.18);
      --text:    #e8eaf0;
      --muted:   #7a8099;
      --green:   #22c55e;
      --red:     #ef4444;
      --radius:  16px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--dark);
      color: var(--text);
      min-height: 100vh;
      overflow-y: auto;
    }

    /* ── Animated background ── */
    .bg-orbs {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
    }
    .orb {
      position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.18;
      animation: drift 12s ease-in-out infinite alternate;
    }
    .orb1 { width: 500px; height: 500px; background: #c9a84c; top: -150px; left: -150px; animation-delay: 0s; }
    .orb2 { width: 400px; height: 400px; background: #764ba2; bottom: -100px; right: -100px; animation-delay: -4s; }
    .orb3 { width: 300px; height: 300px; background: #667eea; top: 40%; left: 40%; animation-delay: -8s; }
    @keyframes drift {
      from { transform: translate(0,0) scale(1); }
      to   { transform: translate(40px,30px) scale(1.08); }
    }

    /* ── Page loader ── */
    #page-loader {
      position: fixed; inset: 0; background: var(--dark);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 9999; transition: opacity 0.5s, visibility 0.5s;
    }
    #page-loader.hidden { opacity: 0; visibility: hidden; }
    .loader-crest { font-size: 56px; margin-bottom: 20px; animation: pulse 1.6s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.12)} }
    .loader-ring {
      width: 48px; height: 48px;
      border: 3px solid rgba(201,168,76,0.2);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loader-label { margin-top: 16px; color: var(--muted); font-size: 0.85rem; letter-spacing: 0.1em; text-transform: uppercase; }

    /* ── Auth card ── */
    .auth-wrap {
      position: relative; z-index: 1;
      width: 100%; max-width: 480px;
      margin: 0 auto;
      padding: 40px 20px;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .auth-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 48px 44px;
      box-shadow: 0 32px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(201,168,76,0.08);
      backdrop-filter: blur(20px);
    }

    .brand {
      text-align: center;
      margin-bottom: 36px;
    }
    .brand-crest {
      font-size: 52px;
      display: block;
      margin-bottom: 10px;
      filter: drop-shadow(0 0 20px rgba(201,168,76,0.4));
    }
    .brand-name {
      font-size: 1.7rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--gold), var(--gold2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.02em;
    }
    .brand-tagline {
      font-size: 0.8rem;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-top: 4px;
    }

    /* ── Mode toggle ── */
    .mode-toggle {
      display: flex;
      background: var(--dark3);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 4px;
      margin-bottom: 28px;
    }
    .mode-toggle button {
      flex: 1; padding: 10px;
      border: none; border-radius: 9px;
      background: transparent;
      font-size: 0.88rem; font-weight: 600;
      color: var(--muted); cursor: pointer;
      transition: all 0.2s; font-family: 'Inter', sans-serif;
    }
    .mode-toggle button.active {
      background: linear-gradient(135deg, var(--gold), #b8922e);
      color: var(--dark);
      box-shadow: 0 4px 16px rgba(201,168,76,0.3);
    }

    /* ── Role selector ── */
    .role-selector { display: flex; gap: 12px; margin-bottom: 24px; }
    .role-btn {
      flex: 1; padding: 16px 10px;
      border: 1.5px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      background: var(--dark3);
      cursor: pointer; text-align: center;
      transition: all 0.2s;
    }
    .role-btn:hover { border-color: rgba(201,168,76,0.3); }
    .role-btn .role-icon { font-size: 1.9rem; display: block; margin-bottom: 6px; }
    .role-btn .role-name { font-size: 0.82rem; font-weight: 700; color: var(--muted); }
    .role-btn.selected-student {
      border-color: var(--green);
      background: rgba(34,197,94,0.08);
      box-shadow: 0 0 20px rgba(34,197,94,0.1);
    }
    .role-btn.selected-student .role-name { color: var(--green); }
    .role-btn.selected-teacher {
      border-color: var(--gold);
      background: rgba(201,168,76,0.08);
      box-shadow: 0 0 20px rgba(201,168,76,0.12);
    }
    .role-btn.selected-teacher .role-name { color: var(--gold); }

    /* ── Fields ── */
    .field { margin-bottom: 16px; }
    .field label {
      display: block; font-size: 0.78rem; font-weight: 600;
      color: var(--muted); margin-bottom: 7px;
      text-transform: uppercase; letter-spacing: 0.06em;
    }
    .field input, .field select {
      width: 100%; padding: 13px 16px;
      background: var(--dark3);
      border: 1.5px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      font-size: 0.95rem; color: var(--text);
      outline: none; transition: border-color 0.2s;
      font-family: 'Inter', sans-serif;
    }
    .field input::placeholder { color: var(--muted); }
    .field input:focus, .field select:focus { border-color: var(--gold); }
    .field select option { background: var(--dark3); color: var(--text); }

    /* ── Submit button ── */
    .btn-submit {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, var(--gold) 0%, #b8922e 100%);
      color: var(--dark);
      border: none; border-radius: 12px;
      font-size: 0.95rem; font-weight: 800;
      cursor: pointer; margin-top: 8px;
      letter-spacing: 0.04em;
      transition: opacity 0.2s, transform 0.1s, box-shadow 0.2s;
      box-shadow: 0 8px 24px rgba(201,168,76,0.3);
      font-family: 'Inter', sans-serif;
    }
    .btn-submit:hover  { opacity: 0.92; box-shadow: 0 12px 32px rgba(201,168,76,0.4); }
    .btn-submit:active { transform: scale(0.98); }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Messages ── */
    .msg {
      padding: 12px 16px; border-radius: 10px;
      font-size: 0.84rem; font-weight: 600;
      margin-bottom: 16px; display: none;
    }
    .msg.error   { background: rgba(239,68,68,0.12); color: #fca5a5; border: 1px solid rgba(239,68,68,0.25); display: block; }
    .msg.success { background: rgba(34,197,94,0.12); color: #86efac; border: 1px solid rgba(34,197,94,0.25); display: block; }

    /* ── Switch mode ── */
    .switch-mode {
      text-align: center; font-size: 0.84rem;
      color: var(--muted); margin-top: 20px;
    }
    .switch-mode a {
      color: var(--gold); font-weight: 600;
      cursor: pointer; text-decoration: none;
    }
    .switch-mode a:hover { text-decoration: underline; }

    /* ── Divider ── */
    .divider {
      display: flex; align-items: center; gap: 12px;
      margin: 6px 0 16px; color: var(--muted); font-size: 0.75rem;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px;
      background: rgba(255,255,255,0.07);
    }
  </style>
</head>
<body>

<!-- Background orbs -->
<div class="bg-orbs">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
</div>

<!-- Page loader -->
<div id="page-loader">
  <div class="loader-crest">🎓</div>
  <div class="loader-ring"></div>
  <div class="loader-label">EduPrime</div>
</div>

<div class="auth-wrap">
  <div class="auth-card">

    <div class="brand">
      <span class="brand-crest">🎓</span>
      <div class="brand-name">EduPrime</div>
      <div class="brand-tagline">Student Management System</div>
    </div>

    <!-- Mode toggle -->
    <div class="mode-toggle">
      <button class="active" id="btn-signin"   onclick="setMode('signin')">Sign In</button>
      <button               id="btn-register"  onclick="setMode('register')">Register</button>
    </div>

    <!-- Message -->
    <div class="msg" id="msg-box"></div>

    <!-- Role selector -->
    <div class="role-selector">
      <div class="role-btn selected-student" id="role-student" onclick="selectRole('student')">
        <span class="role-icon">🎓</span>
        <span class="role-name">Student</span>
      </div>
      <div class="role-btn" id="role-teacher" onclick="selectRole('teacher')">
        <span class="role-icon">👩‍🏫</span>
        <span class="role-name">Teacher</span>
      </div>
    </div>

    <form onsubmit="handleSubmit(event)" autocomplete="off">

      <!-- Register: full name -->
      <div class="field" id="name-field" style="display:none;">
        <label>Full Name</label>
        <input type="text" id="fullname" placeholder="e.g. Alice Johnson"/>
      </div>

      <div class="field">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="you@example.com" autofocus/>
      </div>

      <div class="field">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••"/>
      </div>

      <!-- Register: confirm password -->
      <div class="field" id="confirm-field" style="display:none;">
        <label>Confirm Password</label>
        <input type="password" id="confirm" placeholder="••••••••"/>
      </div>

      <!-- Student: department -->
      <div class="field" id="student-dept-field" style="display:none;">
        <label>Your Department</label>
        <select id="student-dept">
          <option value="">— Choose your department —</option>
          <option value="CSE">CSE – Computer Science &amp; Engineering</option>
          <option value="ECE">ECE – Electronics &amp; Communication</option>
          <option value="IT">IT – Information Technology</option>
          <option value="EEE">EEE – Electrical &amp; Electronics</option>
          <option value="AIDS">AIDS – AI &amp; Data Science</option>
          <option value="AIML">AIML – AI &amp; Machine Learning</option>
          <option value="MECH">MECH – Mechanical Engineering</option>
          <option value="CIVIL">CIVIL – Civil Engineering</option>
          <option value="CHEM">CHEM – Chemical Engineering</option>
          <option value="MBA">MBA – Business Administration</option>
          <option value="MCA">MCA – Computer Applications</option>
        </select>
      </div>

      <!-- Teacher: code + department -->
      <div class="field" id="teacher-secret-field" style="display:none;">
        <label>Teacher Code <span style="color:var(--muted);font-weight:400;text-transform:none;">(from admin)</span></label>
        <input type="password" id="teacher-secret" placeholder="Enter teacher code"/>
      </div>

      <div class="field" id="teacher-subject-field" style="display:none;">
        <label>Your Department</label>
        <select id="teacher-subject">
          <option value="">— Choose your department —</option>
          <option value="CSE">CSE – Computer Science &amp; Engineering</option>
          <option value="ECE">ECE – Electronics &amp; Communication</option>
          <option value="IT">IT – Information Technology</option>
          <option value="EEE">EEE – Electrical &amp; Electronics</option>
          <option value="AIDS">AIDS – AI &amp; Data Science</option>
          <option value="AIML">AIML – AI &amp; Machine Learning</option>
          <option value="MECH">MECH – Mechanical Engineering</option>
          <option value="CIVIL">CIVIL – Civil Engineering</option>
          <option value="CHEM">CHEM – Chemical Engineering</option>
          <option value="MBA">MBA – Business Administration</option>
          <option value="MCA">MCA – Computer Applications</option>
        </select>
      </div>

      <button type="submit" class="btn-submit" id="submit-btn">Sign In →</button>
    </form>

    <p class="switch-mode" id="switch-text">
      Don't have an account? <a onclick="setMode('register')">Register here</a>
    </p>

  </div>
</div>

<script>
  const API = '/api';
  let currentMode = 'signin';
  let currentRole = 'student';

  // ── Helpers ──────────────────────────────────────────────────────────────────
  function showMsg(text, type) {
    const el = document.getElementById('msg-box');
    el.textContent = text;
    el.className = `msg ${type}`;
  }
  function clearMsg() {
    const el = document.getElementById('msg-box');
    el.className = 'msg'; el.textContent = '';
  }
  function setLoading(on) {
    const btn = document.getElementById('submit-btn');
    btn.disabled = on;
    btn.textContent = on ? 'Please wait…' : (currentMode === 'register' ? 'Create Account →' : 'Sign In →');
  }

  // ── Mode ──────────────────────────────────────────────────────────────────────
  function setMode(mode) {
    currentMode = mode; clearMsg();
    const isReg = mode === 'register';
    document.getElementById('btn-signin').classList.toggle('active', !isReg);
    document.getElementById('btn-register').classList.toggle('active', isReg);
    document.getElementById('name-field').style.display    = isReg ? 'block' : 'none';
    document.getElementById('confirm-field').style.display = isReg ? 'block' : 'none';
    document.getElementById('submit-btn').textContent = isReg ? 'Create Account →' : 'Sign In →';
    document.getElementById('switch-text').innerHTML = isReg
      ? `Already have an account? <a onclick="setMode('signin')">Sign in</a>`
      : `Don't have an account? <a onclick="setMode('register')">Register here</a>`;
    updateVisibility();
    ['fullname','email','password','confirm','teacher-secret'].forEach(id => {
      const el = document.getElementById(id); if (el) el.value = '';
    });
    document.getElementById('student-dept').value = '';
    document.getElementById('teacher-subject').value = '';
  }

  // ── Role ──────────────────────────────────────────────────────────────────────
  function selectRole(role) {
    currentRole = role; clearMsg();
    document.getElementById('role-student').className = 'role-btn' + (role === 'student' ? ' selected-student' : '');
    document.getElementById('role-teacher').className = 'role-btn' + (role === 'teacher' ? ' selected-teacher' : '');
    updateVisibility();
  }

  function updateVisibility() {
    const isReg = currentMode === 'register';
    const isStu = currentRole === 'student';
    const isTea = currentRole === 'teacher';
    document.getElementById('student-dept-field').style.display    = (isReg && isStu) ? 'block' : 'none';
    document.getElementById('teacher-secret-field').style.display  = (isReg && isTea) ? 'block' : 'none';
    document.getElementById('teacher-subject-field').style.display = (isReg && isTea) ? 'block' : 'none';
  }

  // ── Submit ────────────────────────────────────────────────────────────────────
  function handleSubmit(e) {
    e.preventDefault(); clearMsg();
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    if (!email)    { showMsg('Please enter your email.', 'error'); return; }
    if (!password) { showMsg('Please enter your password.', 'error'); return; }
    currentMode === 'register' ? register(email, password) : signIn(email, password);
  }

  // ── Register ──────────────────────────────────────────────────────────────────
  async function register(email, password) {
    const fullname = document.getElementById('fullname').value.trim();
    const confirm  = document.getElementById('confirm').value;
    if (!fullname)          { showMsg('Please enter your full name.', 'error'); return; }
    if (password.length < 4){ showMsg('Password must be at least 4 characters.', 'error'); return; }
    if (password !== confirm){ showMsg('Passwords do not match.', 'error'); return; }

    let department = '';
    if (currentRole === 'student') {
      department = document.getElementById('student-dept').value;
      if (!department) { showMsg('Please choose your department.', 'error'); return; }
    }
    if (currentRole === 'teacher') {
      const code = document.getElementById('teacher-secret').value;
      department  = document.getElementById('teacher-subject').value;
      if (!department) { showMsg('Please choose your department.', 'error'); return; }
      // Validate code client-side first for instant feedback
      // Server will also validate
      if (!code) { showMsg('Please enter the teacher code.', 'error'); return; }
    }

    setLoading(true);
    try {
      const res  = await fetch(`${API}/auth/register`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          fullname, email, password,
          role: currentRole, department,
          teacherCode: document.getElementById('teacher-secret').value,
        }),
      });
      const data = await res.json();
      if (!res.ok) { showMsg(data.error || 'Registration failed.', 'error'); return; }

      // Save session
      saveSession(data);
      showMsg('Account created! Redirecting…', 'success');
      setTimeout(() => redirect(data.user.role), 900);
    } catch {
      showMsg('Cannot reach server. Make sure the backend is running.', 'error');
    } finally { setLoading(false); }
  }

  // ── Sign In ───────────────────────────────────────────────────────────────────
  async function signIn(email, password) {
    setLoading(true);
    try {
      const res  = await fetch(`${API}/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password, role: currentRole }),
      });
      const data = await res.json();
      if (!res.ok) { showMsg(data.error || 'Login failed.', 'error'); return; }

      saveSession(data);
      redirect(data.user.role);
    } catch {
      showMsg('Cannot reach server. Make sure the backend is running.', 'error');
    } finally { setLoading(false); }
  }

  function saveSession(data) {
    sessionStorage.setItem('token',      data.token);
    sessionStorage.setItem('email',      data.user.email);
    sessionStorage.setItem('username',   data.user.fullname || data.user.email);
    sessionStorage.setItem('role',       data.user.role);
    sessionStorage.setItem('department', data.user.department || '');
    sessionStorage.setItem('subject',    data.user.department || ''); // teacher compat
    if (data.user.teacherId) sessionStorage.setItem('teacherId', data.user.teacherId);
  }

  function redirect(role) {
    window.location.href = role === 'teacher' ? 'teacher.html' : 'student.html';
  }

  window.addEventListener('load', () => {
    document.getElementById('page-loader').classList.add('hidden');
  });
</script>
</body>
</html>
