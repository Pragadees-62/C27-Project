services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sms-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - JWT_SECRET=sms_super_secret_key_2026
      - TEACHER_CODE=Teachers2026
      - AWS_REGION=${AWS_REGION:-ap-south-1}
      - TABLE_PREFIX=${TABLE_PREFIX:-sms}
    # EC2 IAM Role credentials are picked up automatically from instance metadata
    # No AWS_ACCESS_KEY_ID or AWS_SECRET_ACCESS_KEY needed

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sms-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
